<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Offline – VerfiX</title>
  <meta name="description" content="You are offline. Please check your internet connection and try again."/>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="canonical" href="https://verfix.ch/offline"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1523;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1rem;
    }
    .offline-card {
      max-width: 400px;
      padding: 2rem;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 16px;
    }
    .offline-icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: .5rem; letter-spacing: -.02em; }
    p { color: rgba(255, 255, 255, .6); margin-bottom: 1.5rem; line-height: 1.6; font-size: .95rem; }
    .btn {
      display: inline-block;
      background: #C8252A;
      color: #fff;
      padding: .75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: .9rem;
      transition: background .15s;
    }
    .btn:hover { background: #A01E22; }
    .logo {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.25);
      margin-top: 2rem;
    }
  </style>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#C8252A"/>
</head>
<body>
  <main id="main-content">
    <div class="offline-card">
      <div class="offline-icon">📡</div>
      <h1>You're offline</h1>
      <p>Please check your internet connection and try again.</p>
      <a href="/" class="btn">Return to Home</a>
      <div class="logo">VerfiX AG</div>
    </div>
  </main>
</body>
</html>
