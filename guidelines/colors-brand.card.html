<!-- @dsCard group="Colors" viewport="700x150" name="Brand Core" subtitle="Red · Ink Navy · White — the entire brand runs on three colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:20px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--vx-border);}
  .chip{height:64px;}
  .meta{padding:8px 10px;}
  .nm{font-size:12px;font-weight:700;color:var(--vx-text);}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--vx-light);letter-spacing:.04em;text-transform:uppercase;margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--vx-red)"></div><div class="meta"><div class="nm">VerfiX Red</div><div class="hex">#C8252A · --vx-red</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vx-navy)"></div><div class="meta"><div class="nm">Ink Navy</div><div class="hex">#1A1F2E · --vx-navy</div></div></div>
    <div class="sw"><div class="chip" style="background:#fff"></div><div class="meta"><div class="nm">White</div><div class="hex">#FFFFFF · --vx-bg</div></div></div>
  </div>
</body></html>
