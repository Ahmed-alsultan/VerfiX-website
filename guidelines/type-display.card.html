<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-display);background:#fff;padding:24px;color:var(--vx-text);}
  .d1{font-size:3.4rem;font-weight:800;letter-spacing:-.045em;line-height:1.02;}
  .d1 em{font-style:normal;color:var(--vx-red);}
  .d2{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;margin-top:.4rem;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--vx-light);letter-spacing:.1em;text-transform:uppercase;margin-top:14px;}
</style></head>
<body>
  <div class="d1">Verify once. <em>Trust</em> everywhere.</div>
  <div class="d2">Every signal. One decision.</div>
  <div class="meta">Bricolage Grotesque · 800 · tracking −0.045em</div>
</body></html>
