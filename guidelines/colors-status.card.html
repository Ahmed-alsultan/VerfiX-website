<!-- @dsCard group="Colors" viewport="700x150" name="Status & Decision" subtitle="State colors and the Trust Engine Approve / Review / Reject set" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:20px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .pill{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius);}
  .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  .nm{font-size:11.5px;font-weight:700;}
  .hex{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.03em;margin-top:1px;opacity:.65;}
</style></head>
<body>
  <div class="grid">
    <div class="pill" style="background:var(--vx-success-bg)"><span class="dot" style="background:var(--vx-success)"></span><div><div class="nm" style="color:var(--vx-success-fg)">Success</div><div class="hex" style="color:var(--vx-success-fg)">#16A34A</div></div></div>
    <div class="pill" style="background:var(--vx-warn-bg)"><span class="dot" style="background:var(--vx-warn)"></span><div><div class="nm" style="color:var(--vx-warn-fg)">Warn</div><div class="hex" style="color:var(--vx-warn-fg)">#D97706</div></div></div>
    <div class="pill" style="background:var(--vx-danger-bg)"><span class="dot" style="background:var(--vx-danger)"></span><div><div class="nm" style="color:var(--vx-danger-fg)">Danger</div><div class="hex" style="color:var(--vx-danger-fg)">#C8252A</div></div></div>
    <div class="pill" style="background:var(--vx-info-bg)"><span class="dot" style="background:var(--vx-info)"></span><div><div class="nm" style="color:var(--vx-info-fg)">Info</div><div class="hex" style="color:var(--vx-info-fg)">#2563EB</div></div></div>
  </div>
  <div class="grid" style="margin-top:12px">
    <div class="pill" style="background:rgba(22,163,74,.13);border:1px solid rgba(22,163,74,.3)"><span class="dot" style="background:var(--vx-approve)"></span><div class="nm" style="color:var(--vx-approve)">Approve</div></div>
    <div class="pill" style="background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.25)"><span class="dot" style="background:var(--vx-review)"></span><div class="nm" style="color:var(--vx-review)">Review</div></div>
    <div class="pill" style="background:rgba(200,37,42,.12);border:1px solid rgba(200,37,42,.3)"><span class="dot" style="background:var(--vx-reject)"></span><div class="nm" style="color:var(--vx-reject)">Reject</div></div>
    <div></div>
  </div>
</body></html>
