<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Tight, technical corners — never pill-soft on cards" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:22px;}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .c{text-align:center;}
  .box{width:72px;height:54px;background:var(--vx-red-bg);border:1.5px solid var(--vx-red-line);}
  .n{font-size:11px;font-weight:700;color:var(--vx-text);margin-top:8px;}
  .v{font-family:var(--font-mono);font-size:9.5px;color:var(--vx-light);margin-top:1px;}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="border-radius:3px"></div><div class="n">sm</div><div class="v">3px · badges</div></div>
    <div class="c"><div class="box" style="border-radius:5px"></div><div class="n">base</div><div class="v">5px · buttons</div></div>
    <div class="c"><div class="box" style="border-radius:8px"></div><div class="n">md</div><div class="v">8px · cards</div></div>
    <div class="c"><div class="box" style="border-radius:10px"></div><div class="n">lg</div><div class="v">10px · panels</div></div>
    <div class="c"><div class="box" style="border-radius:100px;width:90px"></div><div class="n">pill</div><div class="v">kicker only</div></div>
  </div>
</body></html>
