<!-- @dsCard group="Type" viewport="700x150" name="Mono labels — IBM Plex Mono" subtitle="Uppercase, wide-tracked kickers, numerals and code" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:24px;}
  .kick{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--font-mono);font-size:.625rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--vx-red);}
  .kick::before{content:'';width:14px;height:1.5px;background:var(--vx-red);}
  .num{font-family:var(--font-mono);font-size:2.4rem;font-weight:700;letter-spacing:-.04em;color:var(--vx-navy);margin-top:.5rem;}
  .num em{font-style:normal;color:var(--vx-red);}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--vx-light);letter-spacing:.1em;text-transform:uppercase;margin-top:12px;}
</style></head>
<body>
  <div class="kick">Trust Engine™</div>
  <div class="num">96<em>/100</em> &nbsp; &lt;3s</div>
  <div class="meta">IBM Plex Mono · 500 label / 700 numerals</div>
</body></html>
