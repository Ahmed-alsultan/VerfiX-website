<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="From hero display down to mono kicker" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-display);background:#fff;padding:22px;color:var(--vx-text);}
  .r{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--vx-off);}
  .t{flex:1;letter-spacing:-.03em;}
  .tag{font-family:var(--font-mono);font-size:9.5px;color:var(--vx-light);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
</style></head>
<body>
  <div class="r"><div class="t" style="font-size:2.6rem;font-weight:800;">Display</div><span class="tag">h1 · 800 · clamp 2.6–4.5rem</span></div>
  <div class="r"><div class="t" style="font-size:1.8rem;font-weight:800;">Section heading</div><span class="tag">h2 · 800</span></div>
  <div class="r"><div class="t" style="font-size:1.05rem;font-weight:700;">Card title</div><span class="tag">h3 · 700</span></div>
  <div class="r"><div class="t" style="font-size:.9375rem;font-weight:400;font-family:var(--font-body);color:var(--vx-muted);">Body paragraph text</div><span class="tag">body · 400</span></div>
  <div class="r" style="border:none"><div class="t" style="font-family:var(--font-mono);font-size:.625rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--vx-red);">Mono kicker label</div><span class="tag">label · mono 500</span></div>
</body></html>
