<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals" subtitle="Text steps and surface / border grays" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:20px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .chip{height:46px;border-radius:var(--radius);border:1px solid var(--vx-border);}
  .nm{font-size:11px;font-weight:700;color:var(--vx-text);margin-top:7px;}
  .hex{font-family:var(--font-mono);font-size:9.5px;color:var(--vx-light);letter-spacing:.03em;text-transform:uppercase;margin-top:2px;}
</style></head>
<body>
  <div class="grid">
    <div><div class="chip" style="background:var(--vx-text)"></div><div class="nm">Text</div><div class="hex">#1A1F2E</div></div>
    <div><div class="chip" style="background:var(--vx-muted)"></div><div class="nm">Muted</div><div class="hex">#4B5563</div></div>
    <div><div class="chip" style="background:var(--vx-light)"></div><div class="nm">Light</div><div class="hex">#9CA3AF</div></div>
    <div><div class="chip" style="background:var(--vx-xlight)"></div><div class="nm">X-Light</div><div class="hex">#D1D5DB</div></div>
    <div><div class="chip" style="background:var(--vx-off)"></div><div class="nm">Off-white</div><div class="hex">#F7F8FA</div></div>
    <div><div class="chip" style="background:var(--vx-border)"></div><div class="nm">Border</div><div class="hex">#E5E7EB</div></div>
    <div><div class="chip" style="background:var(--vx-border-2)"></div><div class="nm">Border 2</div><div class="hex">#D1D5DB</div></div>
    <div><div class="chip" style="background:var(--vx-navy-3)"></div><div class="nm">Navy 3</div><div class="hex">#0F1420</div></div>
  </div>
</body></html>
