<!-- @dsCard group="Colors" viewport="700x150" name="Red Scale" subtitle="Primary red plus its dark, tint and line steps" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:20px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:56px;border-radius:var(--radius);border:1px solid var(--vx-border);}
  .nm{font-size:12px;font-weight:700;color:var(--vx-text);margin-top:8px;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--vx-light);letter-spacing:.04em;text-transform:uppercase;margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--vx-red)"></div><div class="nm">Red</div><div class="hex">#C8252A</div></div>
    <div class="sw"><div class="chip" style="background:var(--vx-red-dark)"></div><div class="nm">Red Dark</div><div class="hex">#A01E22 · hover</div></div>
    <div class="sw"><div class="chip" style="background:var(--vx-red-bg)"></div><div class="nm">Red Tint</div><div class="hex">#FDF2F2 · surface</div></div>
    <div class="sw"><div class="chip" style="background:var(--vx-red-line)"></div><div class="nm">Red Line</div><div class="hex">#F5CECE · border</div></div>
  </div>
</body></html>
