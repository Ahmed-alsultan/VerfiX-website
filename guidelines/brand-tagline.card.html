<!-- @dsCard group="Brand" viewport="700x200" name="Tagline lockup" subtitle="VERIFY · TRUST · SECURE — the mono brand line, on navy" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--vx-navy);padding:0;}
  .wrap{min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
  .brand{font-family:var(--font-display);font-size:2.6rem;font-weight:800;letter-spacing:-.03em;color:#fff;}
  .brand em{font-style:normal;color:var(--vx-red);}
  .line{display:flex;align-items:center;gap:14px;font-family:var(--font-mono);font-size:.72rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.62);}
  .line .dot{width:4px;height:4px;border-radius:50%;background:var(--vx-red);}
  .sub{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28);}
</style></head>
<body>
  <div class="wrap">
    <div class="brand">Verfi<em>X</em></div>
    <div class="line"><span>Verify</span><span class="dot"></span><span>Trust</span><span class="dot"></span><span>Secure</span></div>
    <div class="sub">Swiss Trust Infrastructure · Lausanne</div>
  </div>
</body></html>
