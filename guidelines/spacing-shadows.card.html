<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Low, cool elevation — VerfiX sits flush, never floats" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:26px;}
  .row{display:flex;gap:22px;}
  .c{text-align:center;flex:1;}
  .box{height:58px;background:#fff;border:1px solid var(--vx-border);border-radius:var(--radius-md);}
  .n{font-size:11px;font-weight:700;color:var(--vx-text);margin-top:12px;}
  .v{font-family:var(--font-mono);font-size:9px;color:var(--vx-light);margin-top:1px;}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div><div class="v">hairline lift</div></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div><div class="v">resting card</div></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md</div><div class="v">hover</div></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div><div class="v">mockups</div></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-red);border-color:var(--vx-red);background:var(--vx-red)"></div><div class="n">red</div><div class="v">CTA lift</div></div>
  </div>
</body></html>
