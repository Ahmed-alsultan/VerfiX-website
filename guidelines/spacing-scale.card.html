<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="0.25rem base step — the rhythm behind every gap and pad" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff;padding:22px;}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .c{text-align:center;}
  .bar{background:var(--vx-red);border-radius:2px;width:30px;}
  .v{font-family:var(--font-mono);font-size:9.5px;color:var(--vx-light);margin-top:6px;}
  .n{font-size:10px;font-weight:700;color:var(--vx-text);margin-top:1px;}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="bar" style="height:4px"></div><div class="v">4px</div><div class="n">1</div></div>
    <div class="c"><div class="bar" style="height:8px"></div><div class="v">8px</div><div class="n">2</div></div>
    <div class="c"><div class="bar" style="height:12px"></div><div class="v">12px</div><div class="n">3</div></div>
    <div class="c"><div class="bar" style="height:16px"></div><div class="v">16px</div><div class="n">4</div></div>
    <div class="c"><div class="bar" style="height:24px"></div><div class="v">24px</div><div class="n">5</div></div>
    <div class="c"><div class="bar" style="height:32px"></div><div class="v">32px</div><div class="n">6</div></div>
    <div class="c"><div class="bar" style="height:48px"></div><div class="v">48px</div><div class="n">7</div></div>
    <div class="c"><div class="bar" style="height:64px"></div><div class="v">64px</div><div class="n">8</div></div>
    <div class="c"><div class="bar" style="height:96px"></div><div class="v">96px</div><div class="n">9</div></div>
  </div>
</body></html>
