<!-- @dsCard group="Future Vision" viewport="1240x860" name="VerfiX Future Vision" subtitle="Concept: Identity Gateway, Verification Marketplace & Trust Engine™ as a standalone product" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VerfiX — Future Vision (Concept)</title>
<meta name="description" content="VerfiX future vision concepts — Identity Gateway, Verification Marketplace and the Trust Engine as a standalone product. Forward-looking, not shipped.">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--vx-off);font-family:var(--font-body);color:var(--vx-text);}
  ::selection{background:var(--vx-red);color:#fff;}
  .fv-shell{max-width:1240px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 60px rgba(26,31,46,.06);}
  @media(max-width:900px){.fv-grid{grid-template-columns:1fr!important;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Label, Button, IconChip, Badge, Tag } = window.VerfiXDesignSystem_1000e3;

const CONCEPT = <Badge tone="warn"><i className="fas fa-flask" style={{marginRight:4}} />Concept · not shipped</Badge>;

const GATEWAY = [
  ['fas fa-id-card', 'Document OCR'],
  ['fas fa-face-smile', 'Face & liveness'],
  ['fas fa-magnifying-glass-dollar', 'AML & sanctions'],
  ['fas fa-building', 'KYB & registry'],
  ['fas fa-shield-halved', 'Fraud signals'],
];

const PROVIDERS = [
  { cat: 'Document & OCR', ic: 'fas fa-id-card', items: ['VerfiX Native OCR', 'Regional ID specialist', 'Travel-doc reader'] },
  { cat: 'Biometrics', ic: 'fas fa-face-smile', items: ['VerfiX Liveness', 'Passive face-match', 'Voice biometrics'] },
  { cat: 'AML data', ic: 'fas fa-magnifying-glass-dollar', items: ['Global sanctions union', 'PEP & adverse media', 'Crypto travel-rule'] },
  { cat: 'Registry', ic: 'fas fa-building-columns', items: ['Swiss ZEFIX', 'EU business registers', 'Global UBO graph'] },
];

function VisionApp() {
  return (
    <div className="fv-shell">
      {/* HERO */}
      <section style={{ background: 'var(--vx-navy)', padding: '3.2rem 2.4rem' }}>
        <a href="../website/index.html" style={{ color: 'rgba(255,255,255,.5)', textDecoration: 'none', fontSize: '.82rem' }}><i className="fas fa-arrow-left" style={{ marginRight: 6 }} />Back to site</a>
        <div style={{ marginTop: '1.4rem', display: 'flex', alignItems: 'center', gap: '.6rem' }}>{CONCEPT}<span style={{ fontFamily: 'var(--font-mono)', fontSize: '.62rem', letterSpacing: '.12em', textTransform: 'uppercase', color: 'var(--vx-red)' }}>Where VerfiX is heading</span></div>
        <h1 style={{ fontSize: 'clamp(2.2rem,4vw,3.2rem)', fontWeight: 800, letterSpacing: '-.045em', lineHeight: 1.05, color: '#fff', margin: '.8rem 0 .8rem', maxWidth: 720 }}>
          European identity infrastructure, <span style={{ color: 'var(--vx-red)' }}>one layer</span>.
        </h1>
        <p style={{ fontSize: '1.05rem', color: 'rgba(255,255,255,.6)', lineHeight: 1.7, maxWidth: 600, margin: 0 }}>
          A forward look at the VerfiX platform: a single Identity Gateway, an open Verification Marketplace, and the Trust Engine™ as a product in its own right. These are concept directions — not yet shipped.
        </p>
      </section>

      {/* IDENTITY GATEWAY */}
      <section style={{ padding: '3.6rem 2.4rem', borderBottom: '1px solid var(--vx-border)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '.7rem', marginBottom: '.5rem' }}><Label>Identity Gateway</Label>{CONCEPT}</div>
        <h2 style={{ fontSize: '1.7rem', fontWeight: 800, letterSpacing: '-.03em', margin: '.2rem 0 .6rem' }}>One API for every signal</h2>
        <p style={{ fontSize: '.95rem', color: 'var(--vx-muted)', maxWidth: 620, margin: '0 0 2rem', lineHeight: 1.7 }}>A single integration point that orchestrates OCR, face, AML, KYB and fraud — so customers integrate once and VerfiX routes to the best signal source behind the scenes.</p>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0', flexWrap: 'wrap' }}>
          {/* client */}
          <div style={{ textAlign: 'center' }}>
            <div style={{ background: 'var(--vx-navy)', color: '#fff', borderRadius: 10, padding: '1rem 1.3rem', fontWeight: 700, fontSize: '.9rem' }}><i className="fas fa-code" style={{ color: 'var(--vx-red)', marginRight: 8 }} />Your app</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: '.6rem', color: 'var(--vx-light)', marginTop: 6 }}>one API call</div>
          </div>
          <div style={{ width: 50, height: 2, background: 'var(--vx-border-2)' }} />
          {/* gateway */}
          <div style={{ background: 'var(--vx-red)', color: '#fff', borderRadius: 12, padding: '1.3rem 1.6rem', textAlign: 'center', boxShadow: '0 8px 30px rgba(200,37,42,.35)' }}>
            <i className="fas fa-diagram-project" style={{ fontSize: '1.4rem' }} />
            <div style={{ fontWeight: 800, fontSize: '1rem', marginTop: 6 }}>Identity Gateway</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: '.58rem', opacity: .8 }}>orchestration + Trust Engine</div>
          </div>
          <div style={{ width: 50, height: 2, background: 'var(--vx-border-2)' }} />
          {/* signals */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '.4rem' }}>
            {GATEWAY.map(([ic, n]) => (
              <div key={n} style={{ display: 'flex', alignItems: 'center', gap: '.5rem', background: 'var(--vx-off)', border: '1px solid var(--vx-border)', borderRadius: 7, padding: '.4rem .7rem' }}>
                <i className={ic} style={{ color: 'var(--vx-red)', width: 16, fontSize: '.8rem' }} /><span style={{ fontSize: '.78rem', fontWeight: 600 }}>{n}</span>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* VERIFICATION MARKETPLACE */}
      <section style={{ padding: '3.6rem 2.4rem', background: 'var(--vx-off)', borderBottom: '1px solid var(--vx-border)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '.7rem', marginBottom: '.5rem' }}><Label>Verification Marketplace</Label>{CONCEPT}</div>
        <h2 style={{ fontSize: '1.7rem', fontWeight: 800, letterSpacing: '-.03em', margin: '.2rem 0 .6rem' }}>An open provider ecosystem</h2>
        <p style={{ fontSize: '.95rem', color: 'var(--vx-muted)', maxWidth: 620, margin: '0 0 2rem', lineHeight: 1.7 }}>Customers choose best-of-breed providers per signal and region; providers reach regulated buyers through one integration. VerfiX scores and routes, neutrally.</p>
        <div className="fv-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: '1rem' }}>
          {PROVIDERS.map(p => (
            <div key={p.cat} style={{ background: '#fff', border: '1px solid var(--vx-border)', borderRadius: 10, padding: '1.2rem' }}>
              <IconChip icon={p.ic} size="lg" />
              <h3 style={{ fontSize: '.92rem', fontWeight: 800, margin: '.7rem 0 .6rem' }}>{p.cat}</h3>
              {p.items.map((it, i) => (
                <div key={it} style={{ display: 'flex', alignItems: 'center', gap: '.5rem', padding: '.35rem 0', borderTop: '1px solid var(--vx-off)', fontSize: '.78rem' }}>
                  <i className={i === 0 ? 'fas fa-star' : 'fas fa-plug'} style={{ color: i === 0 ? 'var(--vx-red)' : 'var(--vx-light)', fontSize: '.66rem', width: 12 }} />
                  <span style={{ color: i === 0 ? 'var(--vx-text)' : 'var(--vx-muted)', fontWeight: i === 0 ? 700 : 500 }}>{it}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </section>

      {/* COMPLIANCE HUB */}
      <section style={{ padding: '3.6rem 2.4rem', background: 'var(--vx-off)', borderTop: '1px solid var(--vx-border)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '.7rem', marginBottom: '.5rem' }}><Label>Compliance Hub</Label>{CONCEPT}</div>
        <h2 style={{ fontSize: '1.7rem', fontWeight: 800, letterSpacing: '-.03em', margin: '.2rem 0 .6rem' }}>Cross-border compliance, one control plane</h2>
        <p style={{ fontSize: '.95rem', color: 'var(--vx-muted)', maxWidth: 620, margin: '0 0 2rem', lineHeight: 1.7 }}>A single place to manage verification obligations across jurisdictions — map each market's rules, route flows to the right policy, and keep one audit trail spanning CH, DE, FR and beyond.</p>
        <div className="fv-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: '1rem' }}>
          {[['fas fa-flag', 'Per-market rules', 'nFADP, GDPR, eIDAS, AMLA mapped per jurisdiction.'], ['fas fa-route', 'Policy routing', 'Send each flow to the right rule set automatically.'], ['fas fa-clock-rotate-left', 'Unified audit', 'One immutable trail across every market.'], ['fas fa-file-export', 'Regulator-ready', 'Export filings shaped to each supervisor.']].map(([ic, t, d]) => (
            <div key={t} style={{ background: '#fff', border: '1px solid var(--vx-border)', borderRadius: 10, padding: '1.2rem' }}>
              <IconChip icon={ic} size="lg" />
              <h3 style={{ fontSize: '.92rem', fontWeight: 800, margin: '.7rem 0 .4rem' }}>{t}</h3>
              <p style={{ fontSize: '.8rem', color: 'var(--vx-muted)', lineHeight: 1.55, margin: 0 }}>{d}</p>
            </div>
          ))}
        </div>
      </section>

      {/* TRUST ENGINE STANDALONE */}
      <section style={{ padding: '3.6rem 2.4rem' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '.7rem', marginBottom: '.5rem' }}><Label>Trust Engine™</Label>{CONCEPT}</div>
        <h2 style={{ fontSize: '1.7rem', fontWeight: 800, letterSpacing: '-.03em', margin: '.2rem 0 .6rem' }}>The decision layer, as a product</h2>
        <p style={{ fontSize: '.95rem', color: 'var(--vx-muted)', maxWidth: 620, margin: '0 0 2rem', lineHeight: 1.7 }}>Bring your own signals; let the Trust Engine™ fuse them into one explainable score and decision. Sold standalone for teams that already have data sources but lack a decisioning layer.</p>
        <div className="fv-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '1rem' }}>
          {[['fas fa-layer-group', 'Bring your own signals', 'Feed any document, biometric, AML or device input via API.'], ['fas fa-gauge-high', 'Explainable scoring', 'One 0–100 score with a traceable reason for every decision.'], ['fas fa-sliders', 'Your policy, your rules', 'Configure thresholds and workflows in the no-code Rules Builder.']].map(([ic, t, d]) => (
            <div key={t} style={{ background: 'var(--vx-navy)', color: '#fff', borderRadius: 10, padding: '1.3rem' }}>
              <i className={ic} style={{ color: 'var(--vx-red)', fontSize: '1.2rem' }} />
              <h3 style={{ fontSize: '1rem', fontWeight: 800, margin: '.7rem 0 .4rem' }}>{t}</h3>
              <p style={{ fontSize: '.82rem', color: 'rgba(255,255,255,.6)', lineHeight: 1.6, margin: 0 }}>{d}</p>
            </div>
          ))}
        </div>
        <div style={{ marginTop: '2.4rem', textAlign: 'center', padding: '2rem', background: 'var(--vx-red-bg)', border: '1px solid var(--vx-red-line)', borderRadius: 12 }}>
          <h3 style={{ fontSize: '1.2rem', fontWeight: 800, letterSpacing: '-.02em', margin: '0 0 .5rem' }}>This is a vision, not a roadmap commitment</h3>
          <p style={{ fontSize: '.88rem', color: 'var(--vx-muted)', maxWidth: 520, margin: '0 auto 1.2rem' }}>These concepts show direction. Today VerfiX ships KYC, KYB, AML and the Trust Engine™ inside one platform — explore what's live.</p>
          <Button variant="red" size="lg" icon="fas fa-arrow-right" href="../website/index.html">Explore the live platform</Button>
        </div>
      </section>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<VisionApp />);
</script>
</body>
</html>
