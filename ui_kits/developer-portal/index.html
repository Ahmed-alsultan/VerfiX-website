<!-- @startingPoint section="Platform" subtitle="Developer portal — Stripe/Persona-grade API console" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VerfiX — Developer Portal</title>
<meta name="description" content="VerfiX Developer Portal — API dashboard, keys, sandbox, webhooks, logs, SDKs and reference documentation.">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--vx-off);font-family:var(--font-body);color:var(--vx-text);}
  ::selection{background:var(--vx-red);color:#fff;}
  .portal-shell{max-width:1240px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 60px rgba(26,31,46,.06);}
  @media(max-width:820px){
    .portal-shell > div{grid-template-columns:1fr!important;}
    .portal-shell aside{display:none!important;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Views1.jsx"></script>
<script type="text/babel" src="Views2.jsx"></script>
<script type="text/babel" src="Views3.jsx"></script>
<script type="text/babel" src="Views4.jsx"></script>

<script type="text/babel">
const U = window.DevUI;
const { DevDashboard, DevKeys, DevSandbox, DevWebhooks, DevLogs, DevRateLimits, DevDocs, DevAuth, DevErrors, DevSDKs, DevStatus } = window;

function Portal() {
  const [view, setView] = React.useState('dashboard');
  const [env, setEnv] = React.useState('test');
  React.useEffect(() => { const m = document.querySelector('main'); if (m) m.scrollTop = 0; }, [view]);

  let content;
  switch (view) {
    case 'keys': content = <DevKeys env={env} />; break;
    case 'sandbox': content = <DevSandbox />; break;
    case 'webhooks': content = <DevWebhooks />; break;
    case 'logs': content = <DevLogs />; break;
    case 'ratelimits': content = <DevRateLimits />; break;
    case 'docs': content = <DevDocs />; break;
    case 'auth': content = <DevAuth />; break;
    case 'errors': content = <DevErrors />; break;
    case 'sdks': content = <DevSDKs />; break;
    case 'status': content = <DevStatus />; break;
    default: content = <DevDashboard env={env} />;
  }

  return (
    <div className="portal-shell">
      <U.AppShell view={view} setView={setView} env={env} setEnv={setEnv}>{content}</U.AppShell>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Portal />);
</script>
</body>
</html>
