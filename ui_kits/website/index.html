<script type="text/babel">
const { NavBar, Footer, Homepage, Platform, Industries, Developers, Company, TrustCenter, Demos, Pricing, Pilot, Partners, Resources, DemoModal, ProductApp } = window;

function App() {
  const [page, setPage] = React.useState('home');
  const [demo, setDemo] = React.useState(false);
  const openDemo = () => setDemo(true);

  React.useEffect(() => { window.scrollTo(0, 0); }, [page]);

  // Footer/nav links that don't have a full page route fall back sensibly.
  const route = (key) => {
    const map = { home: 'home', platform: 'platform', industries: 'industries', developers: 'developers', company: 'company', trust: 'trust', demos: 'demos', pricing: 'pricing', pilot: 'pilot', partners: 'partners', resources: 'resources', app: 'app' };
    setPage(map[key] || 'platform');
  };

  if (page === 'app') {
    return <div className="app-shell"><ProductApp onExit={() => setPage('home')} /></div>;
  }

  let content;
  if (page === 'platform') content = <Platform onCTA={openDemo} />;
  else if (page === 'industries') content = <Industries onCTA={openDemo} />;
  else if (page === 'developers') content = <Developers onCTA={openDemo} />;
  else if (page === 'company') content = <Company onCTA={openDemo} onNav={route} />;
  else if (page === 'trust') content = <TrustCenter onNav={route} />;
  else if (page === 'demos') content = <Demos onCTA={openDemo} />;
  else if (page === 'pricing') content = <Pricing onCTA={openDemo} onNav={route} />;
  else if (page === 'pilot') content = <Pilot onCTA={openDemo} />;
  else if (page === 'partners') content = <Partners onCTA={openDemo} />;
  else if (page === 'resources') content = <Resources onNav={route} />;
  else content = <Homepage onCTA={openDemo} />;

  return (
    <div className="app-shell">
      <NavBar current={page} onNav={route} onCTA={openDemo} />
      {content}
      <Footer onNav={route} />
      <DemoModal open={demo} onClose={() => setDemo(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
